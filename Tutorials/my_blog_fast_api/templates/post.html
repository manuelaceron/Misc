{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card post-card shadow-sm p-4">

        <!-- Title -->
        <h1 class="post-title mb-3">{{ post.title }}</h1>

        <!-- Meta Info -->
        <p class="text-muted mb-4">
            By <strong>{{ post.author }}</strong> |
            {{ post.date_posted }}
        </p>

        <!-- Image -->
        <img src="{{ url_for('static', path='images/default.jpg') }}"
             class="img-fluid rounded mb-4"
             alt="Post Image">

        <!-- Content -->
        <div class="post-content mb-4">
            <p style="white-space: pre-line;">
                {{ post.content }}
            </p>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-3">

            <a href="#" class="btn btn-pink">
                Edit
            </a>

            <a href="#" class="btn btn-outline-danger">
                Delete
            </a>

        </div>

    </div>

</div>

{% endblock content %}
