<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>
    {% if title %}
        {{ title }}
    {% else %}
        My Blog
    {% endif %}
    </title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm px-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold blog-title" href="{{url_for('home')}}">{{title}}</a>

        <div class="ms-auto">
            <button id="themeToggle" class="btn btn-outline-light btn-sm">
                🌙 Toggle Mode
            </button>
        </div>
    </div>
</nav>


<!--  MAIN CONTENT -->
<div class="container mt-5">
    {% block content %}
    {% endblock content %}
</div>


<!-- FOOTER -->
<footer class="text-center mt-5 py-4 footer">
    <p class="mb-0">
        &copy; 2026 Manuela ✨ All Rights Reserved
    </p>
</footer>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Theme Toggle Script -->
<script src="{{ url_for('static', path='js/theme.js') }}"></script>

</body>
</html>
