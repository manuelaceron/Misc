{% extends "layout.html" %}

{% block content %}

<h1 class="text-center mb-5 page-title"> Latest Posts </h1>

{% for post in posts %}
<div class="card mb-4 shadow-sm post-card">
    <div class="row g-0">

        <!-- IMAGE -->
        <div class="col-md-4">
            <img src="{{ url_for('static', path='images/default.jpg') }}" 
                 class="img-fluid rounded-start post-image" 
                 alt="Post Image">
        </div>

        <!-- CONTENT -->
        <div class="col-md-8">
            <div class="card-body">

                <h3 class="card-title post-title">{{ post.title }}</h3>

                <p class="text-muted small">
                    By <strong>{{ post.author }}</strong> 
                    | {{ post.date_posted }}
                </p>

                <p class="card-text mt-3">
                    {{ post.content }}
                </p>

                <a href="/post/{{ post.id }}" class="btn btn-pink mt-3">
                    Read More ⭐
                </a>

            </div>
        </div>

    </div>
</div>
{% endfor %}

{% endblock content %}
